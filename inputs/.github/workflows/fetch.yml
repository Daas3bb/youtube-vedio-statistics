name: Fetch YouTube Stats

on:
  push:
    paths:
      - 'inputs/videos.csv'   # 只要这个文件变化就触发
  workflow_dispatch:         # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install pandas requests python-dotenv pytz

      - name: 🔑 Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" > .env

      - name: ▶️ Run fetch script
        run: python fetch_stats.py

      - name: 📤 Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/history.csv
          git commit -m "update data" || echo "No changes"
          git push
