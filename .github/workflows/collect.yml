name: Hourly YouTube Data Collection

on:
  schedule:
    # 每 2 小时（UTC）；北京时间约 +8
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/collect.yml"
      - "backend/**"

concurrency:
  group: kol-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # ---- SSH tunnel to production MySQL ----
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Add server host key to known_hosts to avoid interactive prompt
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Start SSH tunnel to MySQL
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          # Forward local port 33060 -> remote MySQL 127.0.0.1:3306
          ssh -f -N -L 33060:127.0.0.1:3306 \
            -i ~/.ssh/deploy_key \
            -p "${SSH_PORT:-22}" \
            "${SSH_USER}@${SSH_HOST}"
          echo "SSH tunnel established on local port 33060"
          # Give MySQL a moment to accept the connection
          sleep 2

      - name: Run collector
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Point to the LOCAL end of the SSH tunnel
          DATABASE_URL: mysql+pymysql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:33060/kol_youtube?charset=utf8mb4
          DEDUP_GRANULARITY: hour
        working-directory: backend
        run: python collector.py

      - name: Close SSH tunnel
        if: always()
        run: |
          pkill -f "ssh -f -N -L 33060" || true
          rm -f ~/.ssh/deploy_key
