name: Collect and Deploy Static Site

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/collect.yml"
      - "scripts/**"
      - "inputs/**"
      - "data/**"
      - "frontend/**"

concurrency:
  group: kol-static-deploy
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync latest branch before collector
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Run collector
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DEDUP_GRANULARITY: hour
        run: python scripts/collector.py

      - name: Build static data
        run: python scripts/build_static.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          PAGES_BASE: /${{ github.event.repository.name }}/
          VITE_GITHUB_REPO: ${{ github.repository }}
          VITE_GITHUB_BRANCH: ${{ github.ref_name }}
        run: |
          npm ci
          npm run build

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME}"

          git add data/store.json frontend/public/data/site.json frontend/public/thumbnails/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi

          git commit -m "📊 Auto: data update [$(date -u +'%Y-%m-%d %H:%M UTC')]"

          for attempt in 1 2 3 4 5; do
            git fetch origin "${BRANCH}"
            if ! git rebase "origin/${BRANCH}"; then
              echo "Rebase failed (possible conflict)"
              git rebase --abort || true
              git status
              exit 1
            fi
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}/5), retrying in 8s..."
            sleep 8
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
